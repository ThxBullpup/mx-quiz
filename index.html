<!DOCTYPE html>
<html lang='ja'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>BlueArchive名字クイズ</title>
    <meta name='description' content='ブルーアーカイブに登場するキャラクターの苗字を当てるクイズ'>
    <link rel='stylesheet' href='./assets/css/sanitize.css'>
    <link rel='stylesheet' href='./assets/css/style.css'>
</head>
<body>
    <h1 class='heading'>BlueArchive <br>名字クイズ</h1>

    <div id='studentFilter' style='display: block;'>
        <!-- 全選択のチェックボックス -->
        <label class="check-all-label">
            <input type="checkbox" id="check-all-school" checked="checked"> すべて選択 / 解除
        </label>

        <form id='schoolList' action='#' method='school'>
            <!-- ここに学校名の入ったチェックボックスを生成 -->
        </form>
    <div class='menu'>
        <input type="text" name="requestedQuestionCount" id="requestedQuestionCount" placeholder="問題数を入力">
        <button class='button' id='start'>スタート</button>
        <p>未入力で5問出題。<br>問題数が生徒数を上回った場合、生徒数が問題数になります。</p>
    </div>
    </div>

    <div id='quiz' style='display: none;'>
        <h1 id="questionCounter"></h1>
        <div class='faceAndName'>
            <div id='firstName'>ペロロさま</div>
            <img id='faceImage' src='./assets/images/Icons/Peroro_Icon.webp' alt='顔写真'>
            <input type='text' name='userAnswer' id='userAnswer'>
            <button id='answerSend'>解答</button>
        </div>
        <div class="Notation">
            <p>生徒の名字をひらがな又はカタカナで入力してください。</p>
        </div>
    </div>

    <div id='result' style='display: none;'>
        <div id='score'></div>
        <div class='menu'>
            <button class='button' id='repeat'>もう一度</button>
        </div>
    </div>


    <script src='./assets/js/quizgame.js'></script>
</body>
<footer>
    <div class="disclaimers">
        <p class="disclaimers_body">
            <p>本サイトに使用されている画像等の著作権および知的財産権は、株式会社NEXON Games および 株式会社Yostar に帰属します。</p>
        </p>
    </div>
</footer>
</html>
